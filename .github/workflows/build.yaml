name: Maven Build, SonarQube and Nexus

on:
  push:
    branches:
      - master

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Source
        uses: actions/checkout@v4

      # Build using Java 8
      - name: Setup Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Build Project
        run: mvn clean install -DskipTests

      - name: Verify WAR
        run: ls -lh target

 

  
